services:
  - type: web
    name: fiscal-pulse-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py migrate && python manage.py collectstatic --noinput
    startCommand: gunicorn Projeto_Notas_Fiscas.wsgi:application
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.0"
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        sync: false
      - key: ALLOWED_HOSTS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CERT_ENCRYPTION_KEY
        sync: false
      - key: SEFAZ_HOMOLOGACAO
        value: "False"
      - key: REDIS_URL
        fromService:
          type: redis
          name: fiscal-pulse-redis
          property: connectionString
      - key: SENTRY_DSN
        sync: false

  - type: worker
    name: fiscal-pulse-worker
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A Projeto_Notas_Fiscas worker --beat --loglevel=info --concurrency=4 --queues=captura,celery --scheduler django_celery_beat.schedulers:DatabaseScheduler
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.0"
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: CERT_ENCRYPTION_KEY
        sync: false
      - key: SEFAZ_HOMOLOGACAO
        value: "False"
      - key: REDIS_URL
        fromService:
          type: redis
          name: fiscal-pulse-redis
          property: connectionString
      - key: SENTRY_DSN
        sync: false

  - type: redis
    name: fiscal-pulse-redis
    plan: free
    maxmemoryPolicy: noeviction
